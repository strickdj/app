name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      php: ${{ steps.filter.outputs.php }}
      js: ${{ steps.filter.outputs.js }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            php:
              - '**/*.php'
              - 'composer.json'
              - 'composer.lock'
              - 'phpstan.neon'
              - 'pint.json'
              - 'rector.php'
              - 'phpunit.xml'
              - '.env.example'
              - 'config/**/*.php'
              - 'routes/**/*.php'
              - 'database/**/*'
              - 'bootstrap/**/*.php'
              - 'artisan'
              - '.github/actions/setup-php/action.yml'
              - '.github/workflows/ci.yml'
            js:
              - '**/*.{js,jsx,ts,tsx,vue,mjs,cjs}'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vite.config.*'
              - 'eslint.config.*'
              - '.prettierrc*'
              - 'prettier.config.*'
              - 'resources/js/**'
              - 'resources/css/**'

  lint:
    name: Lint (PHP + JS)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.php == 'true' || needs.changes.outputs.js == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: ./.github/actions/setup-php

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Generate Wayfinder routes
        run: php artisan wayfinder:generate --no-interaction

      - name: Pint (check)
        run: vendor/bin/pint --parallel --test

      - name: Rector (dry run)
        run: vendor/bin/rector process --dry-run --ansi

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=256M

      - name: Type check
        run: npm run types:check

      - name: Lint check
        run: npm run lint:check

      - name: Format check
        run: npm run format:check

      - name: Build frontend
        run: npm run build

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.php == 'true' && needs.lint.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: ./.github/actions/setup-php

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          touch database/database.sqlite
          php artisan migrate --force --no-interaction

      - name: Run tests
        run: php artisan test --compact
