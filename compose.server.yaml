services:
  satisfy:
    image: ghcr.io/project-satisfy/satisfy:3.7.0
    ports:
      - "${SATISFY_PORT:-8000}:80"
    volumes:
      - ./docker/satisfy/satis.json:/var/www/html/satis.json
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      COMPOSER_AUTH: ${COMPOSER_AUTH:-}
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-app}
      MYSQL_USER: ${DB_USERNAME:-app_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # Security hardening
      MYSQL_ROOT_HOST: "localhost"
    volumes:
      - mysql-data-production:/var/lib/mysql
      - ./docker/production/mysql/conf.d:/etc/mysql/conf.d:ro
    networks:
      - laravel-production
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true

networks:
  # Attach the service to the 'laravel' network.
  # -----------------------------------------------------------
  # This custom network allows all services within it to communicate using their service names as hostnames.
  # For example, 'php-fpm' can connect to 'mysql' by using 'mysql' as the hostname.
  # -----------------------------------------------------------
  laravel-production:

volumes:
  mysql-data-production:
